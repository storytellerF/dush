name: Android Test

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Start Appium server
        run: |
          # Start the server in its own step (detached from this step's
          # stdio) so it survives into the emulator-runner step without
          # being a child process that would hang it. It is reaped as an
          # orphan at job cleanup.
          nohup appium --log "$RUNNER_TEMP/appium.log" --log-timestamp \
            > "$RUNNER_TEMP/appium.out" 2>&1 < /dev/null &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4723/status > /dev/null; then
              echo "Appium server is up"
              exit 0
            fi
            sleep 1
          done
          echo "Appium server did not become ready" >&2
          cat "$RUNNER_TEMP/appium.out" || true
          exit 1

      - name: Run tests (critical Appium tests only)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          arch: x86_64
          target: google_apis
          profile: pixel_6
          disable-animations: true
          script: |
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            ./gradlew check -PappiumTags=critical --no-daemon

      - name: Upload Appium artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-artifacts
          path: |
            build/appium-failures/
            build/appium-videos/
            ${{ runner.temp }}/appium.log
          if-no-files-found: ignore
